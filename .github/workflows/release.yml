name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller tkinterdnd2

      - name: Build executable
        run: pyinstaller .\ffmpeg-wrapper-gui.spec --noconfirm --clean

      - name: Create release package
        shell: pwsh
        run: |
          $releaseDir = "release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          Copy-Item "dist\ffmpeg-wrapper-gui.exe" "$releaseDir\ffmpeg-wrapper-gui.exe"
          Copy-Item "README.md" "$releaseDir\README.md"
          Copy-Item "LICENSE" "$releaseDir\LICENSE"
          Compress-Archive -Path "$releaseDir\*" -DestinationPath "ffmpeg-wrapper-gui-windows.zip" -Force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ffmpeg-wrapper-gui-windows.zip
          overwrite_files: true
